<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phantom Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080810;--bg2:#0f0f1c;--bg3:#161626;--text:#e2e0f0;--text2:#7a789a;--accent:#a78bfa;--accent2:#34d399;--border:#252540;--me:#2d2060;--them:#131320;--danger:#f87171;--r:14px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hidden{display:none!important}

/* LOBBY */
#lobby{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:18px}
.logo-ring{width:80px;height:80px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 30px rgba(167,139,250,.2)}
h1{font-family:'Space Mono',monospace;font-size:22px;letter-spacing:2px}
.tagline{font-size:13px;color:var(--text2);text-align:center;max-width:260px;line-height:1.7}
.code-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;text-align:center;width:100%;max-width:340px}
.code-label{font-size:10px;letter-spacing:2px;color:var(--text2);margin-bottom:10px;font-family:'Space Mono',monospace}
#my-code{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--accent);letter-spacing:6px;display:block;margin-bottom:12px}
.copy-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 18px;font-size:12px;color:var(--text2);cursor:pointer}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.or-sep{display:flex;align-items:center;gap:12px;width:100%;max-width:340px}
.or-sep::before,.or-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.or-sep span{font-size:11px;color:var(--text2);font-family:'Space Mono',monospace}
.join-wrap{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}
.mono-input{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-size:16px;font-family:'Space Mono',monospace;letter-spacing:4px;text-align:center;outline:none;width:100%}
.mono-input::placeholder{letter-spacing:0;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text2)}
.mono-input:focus{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;width:100%}
.btn-primary:active{transform:scale(.98)}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR — fixed height, no wrapping */
.topbar{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  min-height:56px;
}
.back-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}
.peer-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.peer-info{flex:1;min-width:0}
.peer-name{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.peer-status{font-size:10px;color:var(--accent2);margin-top:1px}

/* CALL BUTTONS — always visible */
.call-btns{display:flex;gap:6px;flex-shrink:0}
.call-btn{
  width:38px;height:38px;border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--bg3);
  cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  flex-shrink:0;
}
.call-btn:hover{border-color:var(--accent);background:var(--bg4,#1e1e32)}
.call-btn:active{transform:scale(.92)}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg-group{display:flex;flex-direction:column;gap:3px;max-width:78%;position:relative}
.msg-group.me{align-self:flex-end;align-items:flex-end}
.msg-group.them{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:var(--r);font-size:14px;line-height:1.55;word-break:break-word}
.me .bubble{background:var(--me);border-bottom-right-radius:4px}
.them .bubble{background:var(--them);border:1px solid var(--border);border-bottom-left-radius:4px}
.meta{font-size:10px;color:var(--text2);padding:0 3px}
.react-row{display:flex;flex-wrap:wrap;gap:4px;padding:0 3px;margin-top:2px}
.react-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 8px;font-size:12px;cursor:pointer}
.emoji-picker{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px;position:absolute;z-index:10;box-shadow:0 8px 32px rgba(0,0,0,.5);bottom:calc(100% + 6px)}
.me .emoji-picker{right:0}.them .emoji-picker{left:0}
.emoji-picker button{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:8px}
.timer-badge{color:var(--accent2);font-size:10px;padding:0 3px}
.sys-msg{text-align:center;font-size:12px;color:var(--text2);font-style:italic;padding:4px 0}

/* INPUT */
.input-area{background:var(--bg2);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0}
.opt-row{display:flex;gap:8px;margin-bottom:8px}
.opt-chip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer}
.opt-chip.active{border-color:var(--accent);color:var(--accent)}
.input-row{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;resize:none;max-height:120px;min-height:40px;line-height:1.5}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--text2)}
#send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:#fff;flex-shrink:0}

/* CALL OVERLAY */
#call-overlay{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column}
#remote-video{width:100%;flex:1;object-fit:cover;background:#0a0a14}
#local-video{position:absolute;bottom:110px;right:16px;width:100px;height:140px;border-radius:12px;object-fit:cover;border:2px solid var(--accent);background:#111}
.call-status{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:14px;color:#fff;background:rgba(0,0,0,.6);padding:7px 18px;border-radius:20px;font-family:'Space Mono',monospace;white-space:nowrap}
.call-controls{position:absolute;bottom:0;left:0;right:0;padding:24px 20px;display:flex;justify-content:center;gap:24px;background:linear-gradient(transparent,rgba(0,0,0,.85))}
.ctrl-btn{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;transition:filter .15s;flex-shrink:0}
.ctrl-btn.end{background:#e53935}
.ctrl-btn.mute,.ctrl-btn.cam{background:#2a2a4a;border:1.5px solid var(--border)}
.ctrl-btn:hover{filter:brightness(1.2)}
.ctrl-btn:active{transform:scale(.92)}

/* INCOMING CALL */
#incoming-call{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--accent);border-radius:18px;padding:22px 28px;z-index:200;text-align:center;min-width:270px;box-shadow:0 8px 40px rgba(0,0,0,.7)}
#incoming-call h3{font-size:16px;margin-bottom:4px}
#incoming-call p{font-size:13px;color:var(--text2);margin-bottom:18px}
.inc-btns{display:flex;gap:16px;justify-content:center}
.inc-btn{border:none;border-radius:50%;width:56px;height:56px;font-size:24px;cursor:pointer;transition:filter .15s}
.inc-btn:hover{filter:brightness(1.1)}
.inc-btn.accept{background:#22c55e}
.inc-btn.reject{background:var(--danger)}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--accent);border-radius:10px;padding:8px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo-ring">👻</div>
  <h1>PHANTOM</h1>
  <p class="tagline">Anonymous chat + voice + video. No phone, no email.</p>
  <div class="code-card">
    <div class="code-label">YOUR CODE</div>
    <span id="my-code">------</span><br/><br/>
    <button class="copy-btn" id="copy-btn">Copy code</button>
  </div>
  <div class="or-sep"><span>OR</span></div>
  <div class="join-wrap">
    <input class="mono-input" id="join-input" maxlength="8" placeholder="Paste their code" autocomplete="off"/>
    <button class="btn-primary" id="join-btn">Connect anonymously →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="hidden">
  <div class="topbar">
    <button class="back-btn" id="back-btn">←</button>
    <div class="peer-avatar">👤</div>
    <div class="peer-info">
      <div class="peer-name" id="peer-code">------</div>
      <div class="peer-status">🟢 Connected</div>
    </div>
    <div class="call-btns">
      <button class="call-btn" id="audio-call-btn" title="Audio call">🎙️</button>
      <button class="call-btn" id="video-call-btn" title="Video call">📹</button>
    </div>
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <div class="opt-row">
      <div class="opt-chip" id="disappear-toggle">⏱ Disappear</div>
    </div>
    <div class="input-row">
      <textarea id="msg-input" rows="1" placeholder="Message..."></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>
</div>

<!-- VIDEO CALL OVERLAY -->
<div id="call-overlay" class="hidden">
  <video id="remote-video" autoplay playsinline></video>
  <video id="local-video" autoplay playsinline muted></video>
  <div class="call-status" id="call-status">Connecting...</div>
  <div class="call-controls">
    <button class="ctrl-btn mute" id="mute-btn">🎙️</button>
    <button class="ctrl-btn end" id="end-call-btn">📵</button>
    <button class="ctrl-btn cam" id="cam-btn">📷</button>
  </div>
</div>

<!-- INCOMING CALL -->
<div id="incoming-call" class="hidden">
  <h3>📞 Incoming Call</h3>
  <p id="call-type-label">Anonymous is calling...</p>
  <div class="inc-btns">
    <button class="inc-btn accept" id="accept-call">✅</button>
    <button class="inc-btn reject" id="reject-call">❌</button>
  </div>
</div>

<div id="toast"></div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCTWcEGYq65mEPa35LIZArWLycDgVbMGlo",
  authDomain: "phantomchat-3ee58.firebaseapp.com",
  projectId: "phantomchat-3ee58",
  storageBucket: "phantomchat-3ee58.firebasestorage.app",
  messagingSenderId: "872388249167",
  appId: "1:872388249167:web:478444835d2b33ec784c3a"
});
const db = firebase.firestore();

const $ = id => document.getElementById(id);
const EMOJIS = ['❤️','👍','😂','😮','😢','🔥'];
const STUN = { iceServers:[{urls:['stun:stun1.l.google.com:19302','stun:stun2.l.google.com:19302']}] };

function genCode(){ let c='',ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; for(let i=0;i<6;i++) c+=ch[Math.floor(Math.random()*ch.length)]; return c; }
function getMyCode(){ let c=localStorage.getItem('phantom_code'); if(!c){c=genCode();localStorage.setItem('phantom_code',c);} return c; }
function sid(a,b){ return [a,b].sort().join('_'); }
function toast(m,d=2500){ const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),d); }
function scrollDown(){ const m=$('messages'); m.scrollTop=m.scrollHeight; }
function sysMsg(txt){ const d=document.createElement('div'); d.className='sys-msg'; d.textContent=txt; $('messages').appendChild(d); scrollDown(); }

let myCode=getMyCode(), currentSession=null, unsubMessages=null, unsubSignal=null;
let disappearMode=false, pc=null, localStream=null, isMuted=false, isCamOff=false, isVideoCall=false;

$('my-code').textContent=myCode;
$('copy-btn').onclick=()=>{ navigator.clipboard.writeText(myCode).catch(()=>{}); toast('✅ Code copied!'); };

$('join-btn').onclick=connect;
$('join-input').addEventListener('keydown',e=>e.key==='Enter'&&connect());

async function connect(){
  const peer=$('join-input').value.trim().toUpperCase();
  if(peer.length<4){ toast('Valid code enter pandu!'); return; }
  if(peer===myCode){ toast('Antha un own code da!'); return; }
  const s=sid(myCode,peer);
  try{
    await db.collection('sessions').doc(s).set({participants:[myCode,peer],createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    currentSession={id:s,peer};
    $('lobby').classList.add('hidden');
    $('chat').classList.remove('hidden');
    $('peer-code').textContent=peer;
    listenMessages(s);
    listenSignaling(s);
  }catch(e){ toast('❌ Firebase error!'); console.error(e); }
}

$('back-btn').onclick=()=>{
  endCall(false);
  $('chat').classList.add('hidden');
  $('lobby').classList.remove('hidden');
  if(unsubMessages){unsubMessages();unsubMessages=null;}
  if(unsubSignal){unsubSignal();unsubSignal=null;}
  $('messages').innerHTML='';
  currentSession=null;
};

$('disappear-toggle').onclick=function(){ disappearMode=!disappearMode; this.classList.toggle('active',disappearMode); this.textContent=disappearMode?'⏱ 30s ON':'⏱ Disappear'; };
$('send-btn').onclick=sendMsg;
$('msg-input').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
$('msg-input').addEventListener('input',function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; });

async function sendMsg(){
  if(!currentSession) return;
  const text=$('msg-input').value.trim();
  if(!text) return;
  await db.collection('sessions').doc(currentSession.id).collection('messages').add({
    text,senderId:myCode,
    timestamp:firebase.firestore.FieldValue.serverTimestamp(),
    disappearAt:disappearMode?new Date(Date.now()+30000):null,
    reactions:{}
  });
  $('msg-input').value=''; $('msg-input').style.height='';
}

function listenMessages(s){
  unsubMessages=db.collection('sessions').doc(s).collection('messages').orderBy('timestamp','asc').onSnapshot(snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added') renderMsg(ch.doc,s);
      if(ch.type==='modified') updateReactions(ch.doc);
      if(ch.type==='removed'){const el=document.querySelector(`[data-id="${ch.doc.id}"]`);if(el)el.remove();}
    });
    scrollDown();
  });
}

function renderMsg(docSnap,s){
  const d=docSnap.data(),isMe=d.senderId===myCode;
  if(document.querySelector(`[data-id="${docSnap.id}"]`)) return;
  const group=document.createElement('div'); group.className=`msg-group ${isMe?'me':'them'}`; group.dataset.id=docSnap.id;
  const bubble=document.createElement('div'); bubble.className='bubble'; bubble.textContent=d.text||'';
  const meta=document.createElement('div'); meta.className='meta';
  const ts=d.timestamp?.toDate(); meta.textContent=ts?ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  const reactRow=document.createElement('div'); reactRow.className='react-row'; reactRow.dataset.msgId=docSnap.id;
  renderReactions(reactRow,d.reactions||{},docSnap.id,s);
  let pt;
  bubble.addEventListener('mousedown',()=>pt=setTimeout(()=>showPicker(docSnap.id,group,s),400));
  bubble.addEventListener('mouseup',()=>clearTimeout(pt));
  bubble.addEventListener('touchstart',()=>pt=setTimeout(()=>showPicker(docSnap.id,group,s),500),{passive:true});
  bubble.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
  bubble.addEventListener('contextmenu',e=>{e.preventDefault();showPicker(docSnap.id,group,s);});
  group.appendChild(bubble); group.appendChild(meta); group.appendChild(reactRow);
  $('messages').appendChild(group);
  if(d.disappearAt){
    const badge=document.createElement('div'); badge.className='timer-badge'; group.appendChild(badge);
    const target=d.disappearAt.toDate().getTime();
    const iv=setInterval(()=>{
      const left=Math.max(0,Math.round((target-Date.now())/1000));
      badge.textContent=`⏱ ${left}s`;
      if(left<=0){clearInterval(iv);db.collection('sessions').doc(s).collection('messages').doc(docSnap.id).delete().catch(()=>{});}
    },1000);
  }
}

function updateReactions(docSnap){const row=document.querySelector(`.react-row[data-msg-id="${docSnap.id}"]`);if(row)renderReactions(row,docSnap.data().reactions||{},docSnap.id,currentSession?.id);}
function renderReactions(row,reactions,msgId,s){row.innerHTML='';Object.entries(reactions).forEach(([em,cnt])=>{if(cnt<1)return;const p=document.createElement('button');p.className='react-pill';p.textContent=`${em} ${cnt}`;p.onclick=()=>addReaction(msgId,em,s);row.appendChild(p);});}
function showPicker(msgId,groupEl,s){document.querySelectorAll('.emoji-picker').forEach(p=>p.remove());const picker=document.createElement('div');picker.className='emoji-picker';EMOJIS.forEach(em=>{const btn=document.createElement('button');btn.textContent=em;btn.onclick=()=>{addReaction(msgId,em,s);picker.remove();};picker.appendChild(btn);});groupEl.appendChild(picker);setTimeout(()=>document.addEventListener('click',()=>picker.remove(),{once:true}),10);}
async function addReaction(msgId,emoji,s){const ref=db.collection('sessions').doc(s).collection('messages').doc(msgId);const snap=await ref.get();const r=snap.data()?.reactions||{};r[emoji]=(r[emoji]||0)+1;await ref.update({reactions:r});}

// ══ WebRTC ══
function signalRef(s){return db.collection('sessions').doc(s).collection('signaling');}
async function sendSignal(type,data){if(!currentSession)return;await signalRef(currentSession.id).add({type,data,from:myCode,to:currentSession.peer,ts:firebase.firestore.FieldValue.serverTimestamp()});}

function listenSignaling(s){
  unsubSignal=signalRef(s).orderBy('ts','asc').onSnapshot(snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type!=='added')return;
      const d=ch.doc.data();
      if(d.to!==myCode)return;
      handleSignal(d);
    });
  });
}

async function handleSignal(d){
  if(d.type==='call-offer'){
    isVideoCall=d.data.video;
    window._pendingOffer=d.data.offer;
    $('call-type-label').textContent=isVideoCall?'📹 Video call வருது...':'🎙️ Audio call வருது...';
    $('incoming-call').classList.remove('hidden');
  }
  else if(d.type==='call-rejected'){ toast('📵 Call rejected'); endCall(false); }
  else if(d.type==='call-accepted'){
    if(pc&&d.data.answer){ await pc.setRemoteDescription(new RTCSessionDescription(d.data.answer)); $('call-status').textContent=isVideoCall?'📹 Video Call':'🎙️ Audio Call'; }
  }
  else if(d.type==='ice-candidate'){
    if(pc&&d.data.candidate){ try{await pc.addIceCandidate(new RTCIceCandidate(d.data.candidate));}catch(e){} }
  }
  else if(d.type==='call-ended'){ sysMsg('📵 Call ended'); endCall(false); }
}

async function startCall(video){
  if(!currentSession){toast('Connect pandu first!');return;}
  isVideoCall=video;
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video});
    $('local-video').srcObject=localStream;
    if(!video)$('local-video').style.display='none';
    pc=new RTCPeerConnection(STUN);
    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    pc.ontrack=e=>{$('remote-video').srcObject=e.streams[0];};
    pc.onicecandidate=e=>{if(e.candidate)sendSignal('ice-candidate',{candidate:e.candidate});};
    pc.onconnectionstatechange=()=>{
      if(pc?.connectionState==='connected')$('call-status').textContent=video?'📹 Video Call':'🎙️ Audio Call';
      if(pc?.connectionState==='disconnected'||pc?.connectionState==='failed'){sysMsg('📵 Call ended');endCall(false);}
    };
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    await sendSignal('call-offer',{offer,video});
    $('call-overlay').classList.remove('hidden');
    $('call-status').textContent='⏳ Ringing...';
  }catch(e){ toast('❌ Mic/Camera access denied!'); console.error(e); }
}

async function acceptCall(){
  $('incoming-call').classList.add('hidden');
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVideoCall});
    $('local-video').srcObject=localStream;
    if(!isVideoCall)$('local-video').style.display='none';
    pc=new RTCPeerConnection(STUN);
    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    pc.ontrack=e=>{$('remote-video').srcObject=e.streams[0];};
    pc.onicecandidate=e=>{if(e.candidate)sendSignal('ice-candidate',{candidate:e.candidate});};
    pc.onconnectionstatechange=()=>{
      if(pc?.connectionState==='connected')$('call-status').textContent=isVideoCall?'📹 Video Call':'🎙️ Audio Call';
      if(pc?.connectionState==='disconnected'||pc?.connectionState==='failed'){sysMsg('📵 Call ended');endCall(false);}
    };
    await pc.setRemoteDescription(new RTCSessionDescription(window._pendingOffer));
    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await sendSignal('call-accepted',{answer});
    $('call-overlay').classList.remove('hidden');
    $('call-status').textContent=isVideoCall?'📹 Video Call':'🎙️ Audio Call';
  }catch(e){ toast('❌ Mic/Camera access denied!'); console.error(e); }
}

function endCall(notify=true){
  if(pc){pc.close();pc=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  $('remote-video').srcObject=null;
  $('local-video').srcObject=null;
  $('local-video').style.display='';
  $('call-overlay').classList.add('hidden');
  $('incoming-call').classList.add('hidden');
  isMuted=false;isCamOff=false;
  $('mute-btn').textContent='🎙️';
  $('cam-btn').textContent='📷';
  if(notify&&currentSession)sendSignal('call-ended',{});
}

$('audio-call-btn').onclick=()=>startCall(false);
$('video-call-btn').onclick=()=>startCall(true);
$('accept-call').onclick=acceptCall;
$('reject-call').onclick=()=>{ $('incoming-call').classList.add('hidden'); sendSignal('call-rejected',{}); };
$('end-call-btn').onclick=()=>{ sysMsg('📵 Call ended'); endCall(true); };
$('mute-btn').onclick=()=>{ if(!localStream)return; isMuted=!isMuted; localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted); $('mute-btn').textContent=isMuted?'🔇':'🎙️'; };
$('cam-btn').onclick=()=>{ if(!localStream)return; isCamOff=!isCamOff; localStream.getVideoTracks().forEach(t=>t.enabled=!isCamOff); $('cam-btn').textContent=isCamOff?'📷off':'📷'; };
</script>
</body>
</html>
