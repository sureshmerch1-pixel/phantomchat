<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phantom Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:system-ui;background:#0b0f1a;color:#fff}
.top{background:#111827;padding:10px;display:flex;justify-content:space-between}
#messages{height:70vh;overflow:auto;display:flex;flex-direction:column;padding:10px;gap:8px}
.msg{max-width:70%;padding:10px;border-radius:12px}
.me{align-self:flex-end;background:#4f46e5}
.them{align-self:flex-start;background:#1f2937}
.bottom{display:flex;padding:10px;gap:6px;background:#111827}
.bottom input{flex:1;padding:10px;background:#1f2937;border:none;color:#fff;border-radius:8px}
.bottom button{padding:10px;border:none;background:#4f46e5;color:#fff;border-radius:8px}
video{width:120px;margin:5px;border-radius:10px}
</style>
</head>

<body>

<div id="lobby">
<h3 id="my-code"></h3>
<input id="join" placeholder="Enter code">
<button onclick="connect()">Connect</button>
</div>

<div id="chat" style="display:none">
<div class="top">
<span id="peer"></span>
<span id="status">🟢</span>
</div>

<div id="videos"></div>
<div id="messages"></div>

<div class="bottom">
<input id="msg">
<button onclick="sendMsg()">➤</button>
<button onclick="startCall()">📞</button>
<button onclick="shareScreen()">🖥️</button>
<input type="file" id="img" hidden>
<button onclick="img.click()">📷</button>
<button onmousedown="startRec()" onmouseup="stopRec()">🎙️</button>
</div>
</div>

<script>
// Firebase
firebase.initializeApp({
 apiKey:"AIza...",
 projectId:"phantomchat-3ee58"
});
const db=firebase.firestore();
const storage=firebase.storage();

// notification
if("Notification" in window) Notification.requestPermission();
const ping=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// helpers
const $=id=>document.getElementById(id);
let my=localStorage.code||Math.random().toString(36).slice(2,8).toUpperCase();
localStorage.code=my;
$('my-code').innerText="Code: "+my;

let session, pc, localStream;

// connect
async function connect(){
 let peer=$('join').value.toUpperCase();
 let id=[my,peer].sort().join('_');
 session={id,peer};

 await db.collection('sessions').doc(id).set({}, {merge:true});

 $('lobby').style.display="none";
 $('chat').style.display="block";
 $('peer').innerText=peer;

 listenMsg();
 listenTyping();
 listenSignal();
}

// send
async function sendMsg(){
 let t=$('msg').value;
 if(!t)return;

 await db.collection('sessions').doc(session.id)
 .collection('msg').add({
  text:btoa(t),
  sender:my,
  ts:Date.now(),
  status:"sent"
 });

 $('msg').value="";
}

// listen
function listenMsg(){
 db.collection('sessions').doc(session.id)
 .collection('msg').orderBy('ts')
 .onSnapshot(s=>{
  $('messages').innerHTML="";
  s.forEach(doc=>{
   let d=doc.data();
   let div=document.createElement('div');
   div.className="msg "+(d.sender===my?"me":"them");

   if(d.text) div.innerText=atob(d.text);

   if(d.sender===my){
    let tick=document.createElement('span');
    tick.innerText = d.status==="sent"?"✓":d.status==="delivered"?"✓✓":"✓✓";
    div.appendChild(tick);
   }

   if(d.sender!==my && d.status==="sent"){
    doc.ref.update({status:"delivered"});
   }
   if(d.sender!==my && d.status==="delivered"){
    doc.ref.update({status:"seen"});
   }

   if(d.sender!==my){
    ping.play();
    if(Notification.permission==="granted"){
     new Notification("New Message",{body:d.text?atob(d.text):"Media 📩"});
    }
   }

   $('messages').appendChild(div);
  });
 });
}

// typing
$('msg').oninput=()=>{
 db.collection('sessions').doc(session.id)
 .set({typing:{[my]:true}},{merge:true});

 setTimeout(()=>{
  db.collection('sessions').doc(session.id)
  .set({typing:{[my]:false}},{merge:true});
 },2000);
};

function listenTyping(){
 db.collection('sessions').doc(session.id)
 .onSnapshot(d=>{
  let t=d.data()?.typing;
  $('status').innerText = t && t[session.peer] ? "✍️" : "🟢";
 });
}

// call
const cfg={iceServers:[{urls:"stun:stun.l.google.com:19302"}]};

function sig(){return db.collection('sessions').doc(session.id).collection('sig');}

async function sendSig(type,data){
 await sig().add({type,data,from:my,to:session.peer});
}

function listenSignal(){
 sig().onSnapshot(s=>{
  s.docChanges().forEach(c=>{
   let d=c.doc.data();
   if(d.to!==my)return;
   handleSig(d);
  });
 });
}

async function handleSig(d){
 if(d.type==="offer") await answer(d.data);
 if(d.type==="answer") await pc.setRemoteDescription(new RTCSessionDescription(d.data));
 if(d.type==="ice") await pc.addIceCandidate(d.data);
}

async function startCall(){
 localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true});
 addVideo(localStream);

 pc=new RTCPeerConnection(cfg);
 localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

 pc.ontrack=e=>addVideo(e.streams[0]);

 pc.onicecandidate=e=>{
  if(e.candidate) sendSig("ice",e.candidate.toJSON());
 };

 let offer=await pc.createOffer();
 await pc.setLocalDescription(offer);
 sendSig("offer",offer);
}

async function answer(of){
 localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true});
 addVideo(localStream);

 pc=new RTCPeerConnection(cfg);
 localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

 pc.ontrack=e=>addVideo(e.streams[0]);

 pc.onicecandidate=e=>{
  if(e.candidate) sendSig("ice",e.candidate.toJSON());
 };

 await pc.setRemoteDescription(new RTCSessionDescription(of));
 let ans=await pc.createAnswer();
 await pc.setLocalDescription(ans);
 sendSig("answer",ans);
}

function addVideo(stream){
 let v=document.createElement("video");
 v.srcObject=stream;
 v.autoplay=true;
 v.playsInline=true;
 $('videos').appendChild(v);
}

// screen
async function shareScreen(){
 let s=await navigator.mediaDevices.getDisplayMedia({video:true});
 s.getTracks().forEach(t=>pc.addTrack(t,s));
}

// voice
let rec,chunks=[];
async function startRec(){
 let s=await navigator.mediaDevices.getUserMedia({audio:true});
 rec=new MediaRecorder(s);
 rec.ondataavailable=e=>chunks.push(e.data);
 rec.start();
}
async function stopRec(){
 rec.stop();
}

// PWA
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
