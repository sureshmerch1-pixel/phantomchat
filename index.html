<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phantom Chat Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:#fff}

/* top bar */
.top{
  height:60px;
  background:#202c33;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

/* messages */
#messages{
  height:calc(100vh - 120px);
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* bubbles */
.msg{
  max-width:70%;
  padding:8px 12px;
  margin:4px 0;
  border-radius:8px;
  font-size:14px;
}
.me{align-self:flex-end;background:#005c4b;}
.them{align-self:flex-start;background:#202c33;}

/* bottom */
.bottom{
  height:60px;
  display:flex;
  padding:5px;
  gap:5px;
  background:#202c33;
}
.bottom input{
  flex:1;
  border:none;
  border-radius:20px;
  padding:10px;
  background:#2a3942;
  color:#fff;
}
.bottom button{
  border:none;
  border-radius:50%;
  width:45px;
  background:#00a884;
  color:#fff;
}

/* video */
video{
  width:120px;
  border-radius:10px;
  margin:5px;
}
</style>
</head>

<body>

<div id="lobby">
<h3 id="myCode"></h3>
<input id="peerInput" placeholder="Enter code">
<button onclick="connect()">Connect</button>
</div>

<div id="chat" style="display:none">
<div class="top">
<span id="peer"></span>
<span id="status">🟢</span>
</div>

<div id="videos">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<div id="messages"></div>

<div class="bottom">
<input id="msgInput">
<button onclick="sendMsg()">➤</button>
<button onclick="startCall()">📞</button>

<input type="file" id="fileInput" hidden>
<button onclick="fileInput.click()">📎</button>

<input type="file" id="imgInput" hidden>
<button onclick="imgInput.click()">📷</button>

<button onmousedown="startRec()" onmouseup="stopRec()">🎙️</button>
</div>
</div>

<script>
// Firebase
firebase.initializeApp({
 apiKey:"AIza...",
 projectId:"phantomchat-3ee58"
});
const db=firebase.firestore();
const storage=firebase.storage();

// helpers
const $=id=>document.getElementById(id);
let my=localStorage.code||Math.random().toString(36).slice(2,8).toUpperCase();
localStorage.code=my;
$('myCode').innerText="Code: "+my;

let session,pc,localStream;

// connect
async function connect(){
 let peer=$('peerInput').value.toUpperCase();
 let id=[my,peer].sort().join('_');
 session={id,peer};

 $('lobby').style.display="none";
 $('chat').style.display="block";
 $('peer').innerText=peer;

 listenMsg();
 listenSignal();
}

// send msg
async function sendMsg(){
 let text=$('msgInput').value;
 if(!text)return;

 await db.collection('sessions').doc(session.id)
 .collection('msg').add({
  text,
  sender:my,
  ts:Date.now(),
  status:"sent"
 });

 $('msgInput').value="";
}

// listen messages
function listenMsg(){
 db.collection('sessions').doc(session.id)
 .collection('msg').orderBy('ts')
 .onSnapshot(s=>{
  $('messages').innerHTML="";
  s.forEach(doc=>{
   let d=doc.data();
   let div=document.createElement('div');
   div.className="msg "+(d.sender===my?"me":"them");

   if(d.text) div.innerText=d.text;

   if(d.file){
    let a=document.createElement('a');
    a.href=d.file;
    a.innerText="📎 "+d.name;
    a.target="_blank";
    div.appendChild(a);
   }

   if(d.image){
    let img=document.createElement('img');
    img.src=d.image;
    img.width=150;
    div.appendChild(img);
   }

   if(d.sender===my){
    let tick=document.createElement('span');
    tick.innerText=d.status==="sent"?"✓":d.status==="delivered"?"✓✓":"✓✓";
    tick.style.marginLeft="5px";
    div.appendChild(tick);
   }

   if(d.sender!==my && d.status==="sent"){
    doc.ref.update({status:"delivered"});
   }

   if(d.sender!==my && d.status==="delivered"){
    doc.ref.update({status:"seen"});
   }

   $('messages').appendChild(div);
  });

  messages.scrollTop=messages.scrollHeight;
 });
}

// FILE SEND
fileInput.onchange=async e=>{
 let file=e.target.files[0];
 let ref=storage.ref("files/"+Date.now()+file.name);
 await ref.put(file);
 let url=await ref.getDownloadURL();

 await db.collection('sessions').doc(session.id)
 .collection('msg').add({
  file:url,
  name:file.name,
  sender:my,
  ts:Date.now()
 });
};

// IMAGE
imgInput.onchange=async e=>{
 let file=e.target.files[0];
 let ref=storage.ref("img/"+Date.now());
 await ref.put(file);
 let url=await ref.getDownloadURL();

 await db.collection('sessions').doc(session.id)
 .collection('msg').add({
  image:url,
  sender:my,
  ts:Date.now()
 });
};

// VOICE
let rec,chunks=[];
async function startRec(){
 let s=await navigator.mediaDevices.getUserMedia({audio:true});
 rec=new MediaRecorder(s);
 rec.ondataavailable=e=>chunks.push(e.data);
 rec.start();
}
async function stopRec(){
 rec.stop();
 rec.onstop=async ()=>{
  let blob=new Blob(chunks);
  let ref=storage.ref("voice/"+Date.now());
  await ref.put(blob);
  let url=await ref.getDownloadURL();

  await db.collection('sessions').doc(session.id)
  .collection('msg').add({
   voice:url,
   sender:my,
   ts:Date.now()
  });
  chunks=[];
 };
}

// CALL
const cfg={iceServers:[{urls:"stun:stun.l.google.com:19302"}]};

function sig(){return db.collection('sessions').doc(session.id).collection('sig');}

async function sendSig(type,data){
 await sig().add({type,data,from:my,to:session.peer});
}

function listenSignal(){
 sig().onSnapshot(s=>{
  s.docChanges().forEach(c=>{
   let d=c.doc.data();
   if(d.to!==my)return;
   handleSig(d);
  });
 });
}

async function handleSig(d){
 if(d.type==="offer") await answer(d.data);
 if(d.type==="answer") await pc.setRemoteDescription(new RTCSessionDescription(d.data));
 if(d.type==="ice") await pc.addIceCandidate(d.data);
}

async function startCall(){
 localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true});
 localVideo.srcObject=localStream;

 pc=new RTCPeerConnection(cfg);
 localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

 pc.ontrack=e=>{
  remoteVideo.srcObject=e.streams[0];
 };

 pc.onicecandidate=e=>{
  if(e.candidate) sendSig("ice",e.candidate.toJSON());
 };

 let offer=await pc.createOffer();
 await pc.setLocalDescription(offer);
 sendSig("offer",offer);
}

async function answer(of){
 localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true});
 localVideo.srcObject=localStream;

 pc=new RTCPeerConnection(cfg);
 localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

 pc.ontrack=e=>{
  remoteVideo.srcObject=e.streams[0];
 };

 pc.onicecandidate=e=>{
  if(e.candidate) sendSig("ice",e.candidate.toJSON());
 };

 await pc.setRemoteDescription(new RTCSessionDescription(of));
 let ans=await pc.createAnswer();
 await pc.setLocalDescription(ans);
 sendSig("answer",ans);
}
</script>

</body>
</html>
